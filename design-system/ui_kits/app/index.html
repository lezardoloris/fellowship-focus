<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fellowship Focus — UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { overflow: hidden; background: var(--bg); }

    .ff-shell {
      display: flex;
      height: 100%;
      min-height: 640px;
      background: var(--bg);
      color: var(--fg);
    }

    .ff-sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .ff-brand {
      padding: 22px 16px 14px;
      line-height: 1.55;
    }

    .ff-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 0;
      flex: 1;
    }

    .ff-nav-item {
      appearance: none;
      border: 0;
      background: transparent;
      text-align: left;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      padding: 12px 16px;
      border-left: 2px solid transparent;
      cursor: pointer;
    }

    .ff-nav-item:hover { color: var(--fg); }

    .ff-nav-item.is-active {
      color: var(--fg);
      background: var(--surface);
      border-left-color: var(--accent);
    }

    .ff-sidebar-foot {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .ff-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .ff-topbar {
      height: var(--topbar-h);
      flex: 0 0 var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
    }

    .ff-topbar-pills { display: flex; gap: 8px; flex-wrap: wrap; }

    .ff-content {
      flex: 1;
      overflow: auto;
      padding: 24px;
      max-width: calc(var(--content-max) + 48px);
      width: 100%;
    }

    .ff-kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .ff-kpi .ff-value { margin: 8px 0 4px; }
    .ff-kpi .ff-progress { margin-top: 12px; }

    .ff-split {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 16px;
      align-items: start;
    }

    .ff-split-main { display: flex; flex-direction: column; gap: 16px; }

    .ff-okr-row { margin-bottom: 12px; }
    .ff-okr-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .ff-focus-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .ff-ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 20px 0 16px;
    }

    .ff-ring-wrap svg { width: 100%; height: 100%; }

    .ff-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .ff-ring-time {
      font-family: var(--font-body);
      font-size: 32px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .ff-focus-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .ff-ladder {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .ff-ladder li {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .ff-ladder li:last-child { border-bottom: 0; }
    .ff-ladder .rank { color: var(--muted); font-variant-numeric: tabular-nums; }
    .ff-ladder .xp { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
    .ff-ladder li.is-you { color: var(--fg); }
    .ff-ladder li.is-you .name { font-weight: 600; }
    .ff-ladder li.is-you .xp { color: var(--accent); }

    .ff-task {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      margin-bottom: 8px;
      font-size: 14px;
    }

    .ff-chat-scroll { display: flex; flex-direction: column; gap: 10px; max-height: 220px; overflow: auto; }
    .ff-msg {
      border-left: 3px solid var(--border);
      background: var(--bg);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 12px;
    }
    .ff-msg.is-session { border-left-color: var(--success); }
    .ff-msg.is-block { border-left-color: var(--accent); }
    .ff-msg-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 4px; font-size: 13px; }
    .ff-msg-body { margin: 0; font-size: 14px; color: var(--fg); }
    .ff-input-bar { display: flex; gap: 8px; margin-top: 12px; }
    .ff-input-bar .ff-input { flex: 1; }

    @media (max-width: 960px) {
      .ff-kpi-row { grid-template-columns: repeat(2, 1fr); }
      .ff-split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/TopBar.jsx"></script>
  <script type="text/babel" src="components/KpiRow.jsx"></script>
  <script type="text/babel" src="components/OkrPanel.jsx"></script>
  <script type="text/babel" src="components/FocusRing.jsx"></script>
  <script type="text/babel" src="components/GuildPanel.jsx"></script>
  <script type="text/babel" src="components/ChatArea.jsx"></script>
  <script type="text/babel" src="components/MessageBubble.jsx"></script>
  <script type="text/babel" src="components/InputBar.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>
  <script type="text/babel">
    const { App } = window;
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
