<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blocked by the Fellowship</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a2418, #0c0f0a);
      color: #e8e4d9;
      font-family: Georgia, serif;
      text-align: center;
      padding: 2rem;
    }
    h1 { color: #c9a227; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #888; max-width: 400px; line-height: 1.6; }
    .ring { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div>
    <div class="ring">💍</div>
    <h1>You cannot pass.</h1>
    <p>
      This site is blocked during your focus quest.
      The Fellowship is counting on you. Return to your work.
    </p>
    <p style="margin-top:1rem;font-size:0.85rem;color:#c45c26">
      −5 XP if logged · Your friends will see you tried.
    </p>
  </div>
</body>
</html>
