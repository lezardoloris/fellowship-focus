<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fellowship Focus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="head">
      <img src="icons/icon48.png" alt="" class="logo" />
      <div>
        <p class="brand">FELLOWSHIP FOCUS</p>
        <p class="who" id="who">Not connected</p>
      </div>
    </header>

    <section class="shield">
      <div>
        <p class="shield-label">Shield</p>
        <p class="shield-hint" id="shieldHint">Block distracting sites</p>
      </div>
      <button id="shieldToggle" class="switch" role="switch" aria-checked="false">
        <span class="knob"></span>
      </button>
    </section>

    <section class="focus" id="focusCard">
      <div class="timer" id="timer">25:00</div>
      <p class="phase" id="phase">Ready</p>
      <button id="focusBtn" class="btn-primary full">Start focus</button>
    </section>

    <section class="stats">
      <div class="stat">
        <span class="stat-val" id="blocks">0</span>
        <span class="stat-label">Blocked today</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="focusMin">0m</span>
        <span class="stat-label">Focused today</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="siteCount">0</span>
        <span class="stat-label">Sites on list</span>
      </div>
    </section>

    <footer class="foot">
      <a id="dash" class="btn-secondary" href="#" target="_blank" rel="noreferrer">Dashboard</a>
      <button id="opts" class="btn-secondary">Settings</button>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
