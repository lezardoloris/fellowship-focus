<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Fellowship Focus</title>
    <link rel="stylesheet" href="block.css" />
  </head>
  <body>
    <div class="stage">
      <div class="scene" id="scene"></div>
      <div class="veil"></div>

      <main class="content">
        <figure class="quote">
          <blockquote id="quote-text"></blockquote>
          <figcaption>
            <span id="quote-name"></span>
            <span class="quote-title" id="quote-title"></span>
          </figcaption>
        </figure>

        <button id="back" class="btn">Back to focus</button>
      </main>

      <footer class="meta">
        <span class="site" id="site"></span>
        <span class="dot">·</span>
        <span id="note"></span>
        <a id="app" class="link" href="#" target="_blank" rel="noreferrer">Dashboard</a>
      </footer>
    </div>

    <script src="personas.js"></script>
    <script src="block.js"></script>
  </body>
</html>
