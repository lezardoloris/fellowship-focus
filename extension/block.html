<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Fellowship Focus</title>
    <link rel="stylesheet" href="block.css" />
  </head>
  <body>
    <main class="card">
      <img src="icons/icon128.png" alt="" class="logo" />
      <h1>You cannot pass.</h1>
      <p class="sub">This site is blocked while your shield is up.<br />The Fellowship is counting on you.</p>
      <div class="site" id="site">—</div>
      <figure class="quote" id="quote" hidden>
        <blockquote id="quote-text"></blockquote>
        <figcaption>
          <span id="quote-name"></span>
          <span class="quote-title" id="quote-title"></span>
        </figcaption>
      </figure>
      <div class="actions">
        <button id="back" class="btn-primary">Back to focus</button>
        <a id="app" class="btn-secondary" href="#" target="_blank" rel="noreferrer">Open dashboard</a>
      </div>
      <p class="note" id="note"></p>
    </main>
    <script src="personas.js"></script>
    <script src="block.js"></script>
  </body>
</html>
