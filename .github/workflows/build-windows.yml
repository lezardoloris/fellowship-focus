name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exe
        working-directory: desktop
        shell: pwsh
        run: |
          pip install -r requirements.txt pyinstaller>=6.0 pytest
          python scripts/download_fonts.py
          python scripts/build_icon.py
          python scripts/generate_placeholders.py
          pyinstaller --noconfirm FellowshipFocus.spec

      - name: Unit tests
        working-directory: desktop
        shell: pwsh
        run: python -m pytest tests -q

      - name: Smoke test bundle
        working-directory: desktop
        shell: pwsh
        run: |
          $exe = "dist/FellowshipFocus/FellowshipFocus.exe"
          if (-not (Test-Path $exe)) { throw "Smoke test FAILED: $exe not found." }
          & $exe --run-proxy --version
          if ($LASTEXITCODE -ne 0) { throw "Smoke test FAILED: embedded mitmproxy engine not reachable (exit $LASTEXITCODE)." }
          $blockCandidates = @(
            "dist/FellowshipFocus/_internal/fellowship_focus/blocker/block.py",
            "dist/FellowshipFocus/fellowship_focus/blocker/block.py"
          )
          if (-not ($blockCandidates | Where-Object { Test-Path $_ })) {
            throw "Smoke test FAILED: block.py not bundled. Checked: $($blockCandidates -join ', ')"
          }
          Write-Host "Smoke tests passed."

      - name: Zip artifact
        working-directory: desktop/dist
        run: Compress-Archive -Path FellowshipFocus -DestinationPath FellowshipFocus-Windows.zip -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/FellowshipFocus-Windows.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: FellowshipFocus-Windows
          path: desktop/dist/FellowshipFocus-Windows.zip
