name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exe
        working-directory: desktop
        shell: pwsh
        run: |
          pip install -r requirements.txt pyinstaller>=6.0
          python scripts/download_fonts.py
          python scripts/generate_placeholders.py
          pyinstaller --noconfirm --windowed --name FellowshipFocus `
            --icon "assets/fellowship.ico" `
            --add-data "assets;assets" `
            --add-data "blocklist.json;." `
            --add-data "fellowship_focus;fellowship_focus" `
            --hidden-import PySide6.QtWebEngineWidgets `
            --collect-all mitmproxy `
            main.py

      - name: Zip artifact
        working-directory: desktop/dist
        run: Compress-Archive -Path FellowshipFocus -DestinationPath FellowshipFocus-Windows.zip -Force

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/FellowshipFocus-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: FellowshipFocus-Windows
          path: desktop/dist/FellowshipFocus-Windows.zip
