name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: desktop
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        working-directory: desktop
        run: |
          pyinstaller --noconfirm --windowed --name FellowshipFocus main.py

      - name: Zip artifact
        working-directory: desktop/dist
        run: Compress-Archive -Path FellowshipFocus -DestinationPath FellowshipFocus-Windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/FellowshipFocus-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
